# Configuración Nginx para producción
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Optimizaciones de rendimiento
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Configuración de upstream para backend
    upstream backend {
        server backend:8080; # Nginx interno del backend escucha en el puerto 8080
    }

    # Servidor HTTP (redirige a HTTPS si se habilita SSL)
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Redirección a HTTPS (descomentar si se usa SSL)
        # return 301 https://$server_name$request_uri;

        # Archivos estáticos del frontend (SPA)
        location / {
            try_files $uri $uri/ /index.html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API requests al backend
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Archivos de storage (imágenes, documentos)
        location /storage {
            alias /var/www/html/storage/app/public;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # Servidor HTTPS (opcional, requiere certificados)
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     root /usr/share/nginx/html;
    #     index index.html;
    #
    #     ssl_certificate /etc/ssl/certs/yourdomain.crt;
    #     ssl_certificate_key /etc/ssl/private/yourdomain.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Configuraciones igual que el bloque HTTP
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location /api {
    #         proxy_pass http://backend;
    #         # ... mismos headers
    #     }
    # }
}