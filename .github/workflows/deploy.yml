name: Deploy Backend to Production

on:
  push:
    branches: [ main ]
  tags: [ 'v*' ]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  # Job de verificación previa (CI)
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

  # Job de despliegue backend
  deploy-backend:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server (example)
        run: |
          echo "Deployment step would run here"
          # Ejemplo: ssh user@server "cd /opt/plataforma && docker-compose pull backend && docker-compose up -d backend"
        # Para usar realmente, configurar secrets: SERVER_SSH_KEY, SERVER_HOST, SERVER_USER
        # y descomentar las líneas siguientes:
        # env:
        #   SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        # - name: Setup SSH
        #   run: |
        #     mkdir -p ~/.ssh
        #     echo "" > ~/.ssh/id_rsa
        #     chmod 600 ~/.ssh/id_rsa
        #     ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        # - name: Deploy via SSH
        #   run: |
        #     ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
        #       cd /opt/plataforma &&
        #       docker-compose pull backend &&
        #       docker-compose up -d backend
        #     "

  # Job de notificación (opcional)
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          echo "Deployment completed (or failed) - send notification via Slack/Email/etc."
          # Usar acciones como actions/slack o curl para enviar notificación
